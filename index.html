<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Game Screen</title>
  </head>
  <body>
    <script>document.addEventListener('touchstart', function(){}, {passive: true});</script> <!-- makes :active instant on mobile -->
    <section class="gameScreen">
      <div class="playerWrapper playerOne">
        <h2 class="playerName">Dan</h2>
        <button class="addPoint"></button>
        <button class="removePoint">Remove</button>
      </div>
      <div class="scores">
        <span class="scoreOne">05</span>
        <span class="scoreTwo">01</span>
      </div>
      <div class="playerWrapper playerTwo">
        <h2 class="playerName">Dian</h2>
        <button class="addPoint"></button>
        <button class="removePoint">Remove</button>
      </div>
    </section>
  </body>
</html>
